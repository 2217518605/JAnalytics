[build]
  builder = "nixpacks"
  buildCommand = "pip install -r requirements.txt"

[deploy]
  startCommand = "cd src && python -m uvicorn main:app --host 0.0.0.0 --port 8002"

[service]
  name = "denim-view"

  [service.databases.postgres]
    name = "denim-db"

  [service.env]
    PGDATABASE_URL = "${{Postgres.DATABASE_URL}}"
    OPENAI_MODEL = "deepseek-v4-pro"
    OPENAI_BASE_URL = "https://api.deepseek.com"
    COZE_PROJECT_TYPE = "agent"
    COZE_PROJECT_ENV = "PROD"
